name: Deploy to Droplet

# Triggers only after the "Tests & Coverage" workflow completes successfully on main.
# This means tests always run first — deploy never happens on a broken build.
on:
  workflow_run:
    workflows: ["Tests & Coverage"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: SSH deploy to DigitalOcean Droplet
    runs-on: ubuntu-latest

    # Only proceed if the triggering test run actually passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          # Run the deploy script that lives on the Droplet itself.
          # Using the absolute path avoids any PATH issues on the remote shell.
          script: /var/www/fitness-ai-app/scripts/deploy.sh
