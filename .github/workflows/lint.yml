name: Lint

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fitness_ai_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: fitness_ai_app/requirements-dev.txt

      - name: Install dev dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip || true
          pip install -r requirements-dev.txt || true

      - name: Run linters
        run: |
          bash scripts/run_linters.sh

      - name: Build lint summary
        run: |
          mkdir -p lint-reports
          echo "## Lint Report" > lint-reports/summary.md
          echo "### Flake8" >> lint-reports/summary.md
          if [ -s lint-reports/flake8.txt ]; then
            head -n 300 lint-reports/flake8.txt >> lint-reports/summary.md || true
          else
            echo "No flake8 output." >> lint-reports/summary.md
          fi
          echo "" >> lint-reports/summary.md
          echo "### Pylint (truncated)" >> lint-reports/summary.md
          if [ -s lint-reports/pylint.json ]; then
            python -m json.tool lint-reports/pylint.json | head -n 300 >> lint-reports/summary.md || cat lint-reports/pylint.json | head -n 300 >> lint-reports/summary.md || true
          else
            echo "No pylint output." >> lint-reports/summary.md
          fi

      - name: Upload lint artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: lint-reports

      - name: Comment lint summary on Pull Request
        uses: thollander/actions-comment-pull-request@v3.0.1
        with:
          file-path: lint-reports/summary.md
