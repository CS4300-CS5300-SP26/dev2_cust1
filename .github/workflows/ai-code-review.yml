name: AI Code Review
 
on:
  pull_request:
    types: [opened, synchronize, reopened]
 
permissions:
  contents: read
  pull-requests: write
 
jobs:
  ai_code_review:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
 
      - name: Install Python and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fitness_ai_app/requirements.txt
 

      - name: Validate OpenAI API key is set
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::OPENAI_API_KEY secret is not set. Go to Settings → Secrets → Actions and add it."
            exit 1
          fi
          echo "OPENAI_API_KEY is present."
          
      - name: Get PR Diff
        run: |
          git fetch
          git diff origin/${{ github.event.pull_request.base.ref }} > diff.txt
 
      - name: Run AI Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python ai_review.py
 
      - name: Upload Review Artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-artifacts
          path: feedback.md
 
      - name: Comment Feedback on Pull Request
        uses: thollander/actions-comment-pull-request@v3.0.1
        with:
          file-path: feedback.md
 
      - name: Cleanup
        run: rm diff.txt feedback.md