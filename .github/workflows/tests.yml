name: Tests & Coverage

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fitness_ai_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: fitness_ai_app/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit & integration tests with coverage
        run: |
          coverage run --source=core manage.py test core -v2
          coverage report

      - name: Run BDD tests (Behave)
        run: python manage.py behave --no-capture
