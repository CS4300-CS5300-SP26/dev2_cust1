name: fitness-ai-app
region: nyc

services:
  - name: web
    environment_slug: python
    source_dir: fitness_ai_app
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_MIRROR_REPO
      branch: main
      deploy_on_push: true
    build_command: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    run_command: |
      python manage.py migrate
      gunicorn fitness_ai_app.wsgi:application --bind 0.0.0.0:$PORT
    envs:
      - key: DEBUG
        value: "False"
        scope: RUN_TIME
      - key: DJANGO_SECRET_KEY
        type: SECRET
        value: REPLACE_WITH_A_SECURE_SECRET
        scope: RUN_TIME
      - key: ALLOWED_HOSTS
        value: your-app-name.ondigitalocean.app
        scope: RUN_TIME
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-app-name.ondigitalocean.app
        scope: RUN_TIME

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
