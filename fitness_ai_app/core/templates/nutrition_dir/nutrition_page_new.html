{% extends "core/base_app.html" %}

{% block title %}Nutrition - Spotter.ai{% endblock %}

{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: #0f0f0f;
        color: #ffffff;
    }

    :root {
        --background: #0f0f0f;
        --card: #181818;
        --border: #242424;
        --accent: #e85c00;
        --accentDim: rgba(232, 92, 0, 0.08);
        --textPrimary: #ffffff;
        --textSecondary: #cccccc;
        --textMuted: #555555;
        --proteinColor: #e85c00;
        --carbColor: #e83355;
        --fatColor: #888888;
    }

    .nutrition-screen {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: var(--background);
        overflow-y: auto;
        padding-bottom: 60px;
    }

    /* Header */
    .header {
        padding: 20px 20px 0;
        background-color: var(--background);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 50;
    }

    .header h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--textPrimary);
    }

    /* Tab Bar */
    .tab-bar-container {
        padding: 16px 20px;
        overflow-x: auto;
        background-color: var(--background);
        border-bottom: 1px solid var(--border);
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    .tab-bar-container::-webkit-scrollbar {
        display: none;
    }

    .tab-bar {
        display: flex;
        gap: 12px;
        min-width: min-content;
    }

    .tab-button {
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
        border: 1px solid var(--border);
        background-color: transparent;
        color: var(--textMuted);
        cursor: pointer;
        transition: all 0.2s ease;
        white-space: nowrap;
    }

    .tab-button:hover {
        border-color: var(--accent);
    }

    .tab-button.active {
        border-color: var(--accent);
        background-color: var(--accentDim);
        color: var(--accent);
    }

    /* Date Navigator */
    .date-navigator {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        gap: 12px;
        background-color: var(--background);
    }

    .date-nav-btn,
    .calendar-btn {
        background-color: transparent;
        border: none;
        color: var(--textPrimary);
        cursor: pointer;
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease;
    }

    .date-nav-btn:hover,
    .calendar-btn:hover {
        color: var(--accent);
    }

    .date-label {
        font-size: 14px;
        color: var(--textSecondary);
        font-weight: 500;
        flex: 1;
        text-align: center;
    }

    /* Content Container */
    .content-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 600px;
        margin: 0 auto;
        width: 100%;
    }

    /* Cards */
    .card {
        background-color: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .card:hover {
        border-color: var(--accent);
        background-color: #1e1e1e;
    }

    .card-label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--textMuted);
        display: block;
        margin-bottom: 12px;
        letter-spacing: 0.5px;
    }

    /* Calories Card */
    .calories-card {
        padding: 20px;
    }

    .calories-display {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 16px;
    }

    .calories-value {
        font-size: 36px;
        font-weight: 700;
        color: var(--textPrimary);
        font-family: 'Courier New', monospace;
    }

    .calories-unit {
        font-size: 14px;
        color: var(--textMuted);
    }

    .progress-bar {
        width: 100%;
        height: 8px;
        background-color: var(--border);
        border-radius: 4px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background-color: var(--accent);
        transition: width 0.3s ease;
    }

    /* Macros Card */
    .macros-card {
        padding: 20px;
    }

    .macros-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
    }

    .macro-pill {
        border: 2px solid;
        border-radius: 12px;
        padding: 16px 12px;
        text-align: center;
        background-color: rgba(0, 0, 0, 0.3);
    }

    .macro-percentage {
        font-size: 24px;
        font-weight: 700;
        font-family: 'Courier New', monospace;
        color: var(--textPrimary);
    }

    .macro-name {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--textMuted);
        margin-top: 4px;
    }

    .macro-grams {
        font-size: 12px;
        font-family: 'Courier New', monospace;
        color: var(--textMuted);
        margin-top: 4px;
    }

    /* Meals Section */
    .meals-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 0 12px;
    }

    .section-label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--textMuted);
        letter-spacing: 0.5px;
    }

    .add-meal-btn {
        background-color: transparent;
        border: none;
        color: var(--accent);
        cursor: pointer;
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease;
    }

    .add-meal-btn:hover {
        color: #ff9f43;
    }

    /* Meals List */
    .meals-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    /* Meal Card */
    .meal-card {
        background-color: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
    }

    .meal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px;
        border-bottom: 1px solid var(--border);
    }

    .meal-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--textSecondary);
    }

    .meal-calories {
        font-size: 12px;
        color: var(--textMuted);
        font-family: 'Courier New', monospace;
        flex: 1;
        text-align: right;
        margin-right: 12px;
    }

    .meal-edit-btn {
        background-color: transparent;
        border: none;
        color: var(--textMuted);
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease;
    }

    .meal-edit-btn:hover {
        color: var(--accent);
    }

    /* Food Items List */
    .food-items-list {
        display: flex;
        flex-direction: column;
    }

    /* Food Item */
    .food-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: background-color 0.2s ease;
    }

    .food-item:last-child {
        border-bottom: none;
    }

    .food-item:hover {
        background-color: rgba(0, 0, 0, 0.2);
    }

    .food-item.completed .food-name {
        text-decoration: line-through;
        color: var(--textMuted);
    }

    .checkbox {
        width: 16px;
        height: 16px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background-color: transparent;
        color: var(--textPrimary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s ease;
    }

    .checkbox:hover {
        border-color: var(--accent);
    }

    .checkbox.checked {
        background-color: var(--accent);
        border-color: var(--accent);
        color: #000;
    }

    .food-name {
        font-size: 13px;
        color: var(--textSecondary);
        flex: 1;
    }

    .food-calories {
        font-size: 12px;
        color: var(--textMuted);
        font-family: 'Courier New', monospace;
        min-width: 40px;
        text-align: right;
    }

    .delete-btn {
        background-color: transparent;
        border: none;
        color: var(--textMuted);
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: color 0.2s ease;
    }

    .delete-btn:hover {
        color: #e74c3c;
    }

    /* Add Food Button */
    .add-food-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background-color: transparent;
        border: none;
        color: var(--textMuted);
        font-size: 13px;
        cursor: pointer;
        transition: color 0.2s ease;
    }

    .add-food-btn:hover {
        color: var(--accent);
    }

    /* Log a Meal Button */
    .log-meal-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        border: 2px dashed var(--border);
        border-radius: 14px;
        background-color: transparent;
        color: var(--textMuted);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 8px;
    }

    .log-meal-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
    }

    /* Bottom Navigation */
    .bottom-nav {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 12px 0;
        background-color: var(--card);
        border-top: 1px solid var(--border);
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
    }

    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px 12px;
        background-color: transparent;
        border: none;
        color: #444;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        transition: color 0.2s ease;
    }

    .nav-item:hover {
        color: var(--textMuted);
    }

    .nav-item.active {
        color: var(--accent);
    }

    /* Responsive */
    @media (max-width: 480px) {
        .macros-grid {
            grid-template-columns: 1fr;
        }
    }

    svg {
        width: 24px;
        height: 24px;
    }
</style>
<div class="nutrition-screen">
    <!-- Header -->
    <div class="header">
        <h1>Nutrition</h1>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar-container">
        <div class="tab-bar">
            <button class="tab-button active" data-tab="today">Today</button>
            <button class="tab-button" data-tab="history">History</button>
            <button class="tab-button" data-tab="search">Search</button>
            <button class="tab-button" data-tab="supplements">Supplements</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content-container">
        <!-- Date Navigator -->
