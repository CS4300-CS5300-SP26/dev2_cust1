{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Spotter.ai</title>
    <style>
        :root {
            --harvest-orange: #F67D26;
            --black: #000000;
            --white: #FFFFFF;
            --classic-crimson: #D42338;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: 0;
        }
        .dash-container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 32px;
            box-sizing: border-box;
        }
        .logo-container {
            width: 100%;
            max-width: 320px;
            border: 2px solid var(--harvest-orange);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(246, 125, 38, 0.08);
            margin-bottom: 24px;
            box-sizing: border-box;
        }
        .logo-container img {
            width: 80px;
            height: auto;
        }
        .welcome {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.65);
            margin-bottom: 36px;
        }
        {% if messages %}.messages { width: 100%; max-width: 320px; margin-bottom: 18px; }{% endif %}
        .msg {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            background: rgba(46,204,113,0.15);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        .btn {
            width: 100%;
            max-width: 320px;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s ease;
            box-sizing: border-box;
        }
        .btn-logout {
            background: transparent;
            color: var(--classic-crimson);
            border: 2px solid var(--classic-crimson);
            margin-top: auto;
            margin-bottom: 20px;
        }
        .btn-logout:hover {
            background: rgba(212, 35, 56, 0.1);
        }
    </style>
</head>
<body>
    <div class="dash-container">
        <div class="logo-container">
            <img src="{% static 'core/images/logo.png' %}" alt="Spotter.ai Logo">
        </div>
        <div class="welcome">Welcome, {{ request.user.first_name|default:request.user.username }}!</div>
        <div class="subtitle">Your Spotter.ai dashboard</div>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="msg">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        <a href="{% url 'user_logout' %}" class="btn btn-logout">Log Out</a>
    </div>
</body>
</html>
