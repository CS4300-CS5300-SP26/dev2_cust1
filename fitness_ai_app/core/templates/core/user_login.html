{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Spotter.ai</title>
    <style>
        :root {
            --harvest-orange: #F67D26;
            --black: #000000;
            --white: #FFFFFF;
            --classic-crimson: #D42338;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .splash-container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 32px 40px;
            box-sizing: border-box;
        }
        .logo-container {
            width: 100%;
            max-width: 320px;
            border: 2px solid var(--harvest-orange);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(246, 125, 38, 0.08);
            margin-bottom: 24px;
            box-sizing: border-box;
        }
        .logo-container img {
            width: 140px;
            height: auto;
            box-sizing: border-box;
        }
        .title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            box-sizing: border-box;
        }
        .desc {
            font-size: 1rem;
            color: rgba(255,255,255,0.65);
            margin-bottom: 48px;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            max-width: 320px;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s ease, transform 0.1s ease;
            box-sizing: border-box;
        }
        .btn-primary {
            background-color: var(--harvest-orange);
            color: var(--white);
            border: none;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .spacer {
            flex: 1;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-container">
            <img src="{% static 'core/images/logo.png' %}" alt="Spotter.ai Logo">
        </div>
        <div class="title">Log In</div>
        <div class="desc">Sign in to your Spotter.ai account to continue.</div>
        <form style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:18px;margin-bottom:24px;">
            <input type="email" name="email" placeholder="Email" required style="padding:14px 18px;border-radius:10px;border:2px solid var(--harvest-orange);background:rgba(246,125,38,0.08);color:var(--white);font-size:1rem;margin-bottom:0;box-sizing:border-box;">
            <input type="password" name="password" placeholder="Password" required style="padding:14px 18px;border-radius:10px;border:2px solid var(--harvest-orange);background:rgba(246,125,38,0.08);color:var(--white);font-size:1rem;margin-bottom:0;box-sizing:border-box;">
            <button type="submit" class="btn btn-primary" style="margin-top:18px;">Log In</button>
        </form>
        <div class="spacer"></div>
    </div>
</body>
</html>
