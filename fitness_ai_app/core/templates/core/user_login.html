{% extends "core/base_public.html" %}

{% block title %}Log In - Spotter.ai{% endblock %}

{% block content %}
<div class="title">Log In</div>
<div class="desc">Sign in to your Spotter.ai account to continue.</div>
<form method="post" action="{% url 'user_login' %}" style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:18px;margin-bottom:24px;">
    {% csrf_token %}
    <input type="email" name="email" placeholder="Email" required style="padding:14px 18px;border-radius:10px;border:2px solid var(--harvest-orange);background:rgba(246,125,38,0.08);color:var(--white);font-size:1rem;margin-bottom:0;box-sizing:border-box;">
    <input type="password" name="password" placeholder="Password" required style="padding:14px 18px;border-radius:10px;border:2px solid var(--harvest-orange);background:rgba(246,125,38,0.08);color:var(--white);font-size:1rem;margin-bottom:0;box-sizing:border-box;">
    <button type="submit" class="btn btn-primary" style="margin-top:18px;">Log In</button>
</form>
<a href="{% url 'user_get_started' %}" style="color:var(--harvest-orange);font-size:0.95rem;text-decoration:none;">Don't have an account? Sign Up</a>

<!-- Social Login Divider -->
<div style="width:100%;max-width:320px;display:flex;align-items:center;margin:28px 0 20px;">
    <div style="flex:1;height:1px;background:rgba(255,255,255,0.2);"></div>
    <span style="padding:0 16px;color:rgba(255,255,255,0.5);font-size:0.9rem;">or continue with</span>
    <div style="flex:1;height:1px;background:rgba(255,255,255,0.2);"></div>
</div>

<!-- Social Login Buttons -->
<div style="width:100%;max-width:320px;display:flex;flex-direction:row;justify-content:center;gap:16px;">
    <a href="{% url 'google_login' %}" title="Continue with Google" style="display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);text-decoration:none;transition:background 0.2s;">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width:24px;height:24px;">
    </a>
    <a href="{% url 'apple_login' %}" title="Continue with Apple" style="display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);text-decoration:none;transition:background 0.2s;">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
    </a>
    <a href="{% url 'facebook_login' %}" title="Continue with Facebook" style="display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);text-decoration:none;transition:background 0.2s;">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
    </a>
    <a href="{% url 'instagram_login' %}" title="Continue with Instagram" style="display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);text-decoration:none;transition:background 0.2s;">
        <svg viewBox="0 0 24 24" width="24" height="24"><defs><linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#feda75"/><stop offset="25%" style="stop-color:#fa7e1e"/><stop offset="50%" style="stop-color:#d62976"/><stop offset="75%" style="stop-color:#962fbf"/><stop offset="100%" style="stop-color:#4f5bd5"/></linearGradient></defs><rect x="2" y="2" width="20" height="20" rx="5" fill="url(#ig)"/><circle cx="12" cy="12" r="5" fill="none" stroke="white" stroke-width="1.5"/><circle cx="17.5" cy="6.5" r="1.2" fill="white"/></svg>
    </a>
</div>
{% endblock %}
