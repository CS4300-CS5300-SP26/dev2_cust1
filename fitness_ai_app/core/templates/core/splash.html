{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotter.ai</title>
    <style>
        /* Reset */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Color palette */
        :root {
            --harvest-orange: #F67D26;
            --black: #000000;
            --white: #FFFFFF;
            --classic-crimson: #D42338;
            --dark-bg: #0A0A0A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(246, 125, 38, 0.12) 0%, transparent 60%);
        }

        .splash-container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 32px 40px;
        }

        /* Logo area */
        header {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo-container {
            width: 100%;
            border: 2px solid var(--harvest-orange);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(246, 125, 38, 0.08);
            box-shadow: 0 0 30px rgba(246, 125, 38, 0.1);
        }

        .logo-container img {
            width: 140px;
            height: auto;
        }

        /* Title */
        .app-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* Subtitle */
        .app-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 16px;
        }

        /* Features section */
        section.features {
            width: 100%;
            max-width: 320px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 48px;
        }

        .feature-item {
            text-align: center;
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.8rem;
        }

        .feature-icon {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        /* Buttons */
        nav {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--harvest-orange);
            color: var(--white);
            border: none;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(246, 125, 38, 0.3);
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--harvest-orange);
            border: 2px solid var(--harvest-orange);
            margin-bottom: 24px;
        }

        .btn-secondary:hover {
            background-color: rgba(246, 125, 38, 0.1);
        }

        /* Note text */
        .note-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
            text-align: center;
        }

        .note-text span {
            color: var(--classic-crimson);
            font-weight: 600;
        }

        /* Footer */
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            padding-top: 16px;
        }

        /* Spacer to push content toward center-top */
        .spacer {
            flex: 1;
        }
    </style>
</head>
<body>
    <main class="splash-container">
        <header>
            <div class="logo-container">
                <img src="{% static 'core/images/logo.png' %}" alt="Spotter.ai Logo">
            </div>
        </header>

        <h1 class="app-title">Spotter.ai</h1>
        <p class="app-subtitle">Your all-in-one fitness companion</p>

        <section class="features">
            <div class="feature-item">
                <div class="feature-icon">&#x1F4AA;</div>
                <span>Workouts</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">&#x1F4CA;</div>
                <span>Tracking</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">&#x1F916;</div>
                <span>AI Coach</span>
            </div>
        </section>

        <nav>
            <a href="#" class="btn btn-primary">Get Started</a>
            <a href="#" class="btn btn-secondary">Log In</a>
        </nav>

        <p class="note-text"><span>AI-powered</span> fitness plans tailored just for you</p>

        <div class="spacer"></div>

        <footer>
            <p>&copy; 2026 Spotter.ai &mdash; All rights reserved.</p>
        </footer>
    </main>
</body>
</html>
