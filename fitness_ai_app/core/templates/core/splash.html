{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFlow</title>
    <style>
        /* Reset */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Color palette */
        :root {
            --harvest-orange: #F67D26;
            --black: #000000;
            --white: #FFFFFF;
            --classic-crimson: #D42338;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash-container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 32px 40px;
        }

        /* Logo area */
        .logo-container {
            width: 100%;
            max-width: 320px;
            border: 2px solid var(--harvest-orange);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(246, 125, 38, 0.08);
            margin-bottom: 24px;
        }

        .logo-container img {
            width: 140px;
            height: auto;
        }

        /* Title */
        .app-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* Subtitle */
        .app-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 48px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            max-width: 320px;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--harvest-orange);
            color: var(--white);
            border: none;
            margin-bottom: 16px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--harvest-orange);
            border: 2px solid var(--harvest-orange);
            margin-bottom: 24px;
        }

        .btn-secondary:hover {
            background-color: rgba(246, 125, 38, 0.1);
        }

        /* Note text */
        .note-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        .note-text span {
            color: var(--classic-crimson);
            font-weight: 600;
        }

        /* Spacer to push content toward center-top */
        .spacer {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-container">
            <img src="{% static 'core/images/logo.png' %}" alt="FitFlow Logo">
        </div>

        <h1 class="app-title">FitFlow</h1>
        <p class="app-subtitle">Your all-in-one fitness companion</p>

        <a href="#" class="btn btn-primary">Get Started</a>
        <a href="#" class="btn btn-secondary">Log In</a>


        <div class="spacer"></div>
    </div>
</body>
</html>
