{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotter.ai – Chat</title>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--orange:#F67D26;--black:#000000;--white:#FFFFFF}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--black);color:var(--white);height:100vh;display:flex;flex-direction:column}
        header{background:var(--black);border-bottom:2px solid var(--orange);padding:16px 24px;display:flex;align-items:center;gap:12px}
        header h1{font-size:1.25rem;font-weight:700;color:var(--orange)}
        header a{color:var(--white);text-decoration:none;font-size:.85rem;opacity:.6;margin-left:auto}
        header a:hover{opacity:1}
        .chat-window{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
        .msg{max-width:75%;padding:14px 18px;border-radius:16px;line-height:1.5;font-size:.95rem;word-wrap:break-word;white-space:pre-wrap}
        .msg.user{align-self:flex-end;background:var(--orange);color:var(--white);border-bottom-right-radius:4px}
        .msg.assistant{align-self:flex-start;background:#1a1a1a;color:var(--white);border:1px solid #333;border-bottom-left-radius:4px}
        .msg.error{align-self:center;background:#2a0a0a;color:#ff6b6b;border:1px solid #ff6b6b;font-size:.85rem}
        .typing{align-self:flex-start;padding:14px 18px;font-size:.95rem;color:rgba(255,255,255,.75);font-style:italic}
        .input-bar{display:flex;gap:12px;padding:16px 24px;border-top:2px solid var(--orange);background:var(--black)}
        .input-bar textarea{flex:1;background:#111;color:var(--white);border:1px solid #333;border-radius:12px;padding:14px 16px;font-size:1rem;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:120px}
        .input-bar textarea:focus{border-color:var(--orange)}
        .input-bar textarea::placeholder{color:rgba(255,255,255,.65)}
        .input-bar button{background:var(--orange);color:var(--white);border:none;border-radius:12px;padding:0 24px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
        .input-bar button:hover{opacity:.85}
        .input-bar button:disabled{opacity:.4;cursor:not-allowed}
    </style>
</head>
<body>
    <header>
        <h1>Spotter.ai Chat</h1>
        <a href="/">← Home</a>
    </header>

    <div class="chat-window" id="chatWindow"></div>

    <div class="input-bar">
        <textarea id="userInput" placeholder="Ask your fitness question…" rows="1"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInput  = document.getElementById('userInput');
        const sendBtn    = document.getElementById('sendBtn');
        const history    = [];

        function addBubble(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addBubble('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            history.push({ role: 'user', content: text });

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.textContent = 'Thinking…';
            chatWindow.appendChild(typing);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: history })
                });
                const data = await res.json();
                typing.remove();

                if (data.error) {
                    addBubble('error', data.error);
                } else {
                    history.push({ role: 'assistant', content: data.reply });
                    addBubble('assistant', data.reply);
                }
            } catch (err) {
                typing.remove();
                addBubble('error', 'Network error – could not reach server.');
            }
            sendBtn.disabled = false;
            userInput.focus();
        }

        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        });
    </script>
</body>
</html>
