{% extends "core/base_app.html" %}

{% block title %}Chat - Spotter.ai{% endblock %}

{% block extra_css %}
<style>
    .chat-wrapper{width:100%;max-width:600px;flex:1;display:flex;flex-direction:column;min-height:0;margin-top:8px}
    .chat-header{font-size:1.25rem;font-weight:700;color:var(--harvest-orange);text-align:center;margin-bottom:12px}
    .chat-window{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:8px 0;min-height:0}
    .msg{max-width:80%;padding:12px 16px;border-radius:16px;line-height:1.5;font-size:.95rem;word-wrap:break-word;white-space:pre-wrap}
    .msg.user{align-self:flex-end;background:var(--harvest-orange);color:var(--white);border-bottom-right-radius:4px}
    .msg.assistant{align-self:flex-start;background:#1a1a1a;color:var(--white);border:1px solid #333;border-bottom-left-radius:4px}
    .msg.error{align-self:center;background:#2a0a0a;color:#ff6b6b;border:1px solid #ff6b6b;font-size:.85rem}
    .typing{align-self:flex-start;padding:12px 16px;font-size:.95rem;color:rgba(255,255,255,.5);font-style:italic}
    .chat-input-bar{display:flex;gap:10px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
    .chat-input-bar textarea{flex:1;background:rgba(246,125,38,.08);color:var(--white);border:2px solid var(--harvest-orange);border-radius:12px;padding:12px 14px;font-size:1rem;font-family:inherit;resize:none;outline:none;min-height:46px;max-height:100px}
    .chat-input-bar textarea:focus{border-color:var(--harvest-orange);background:rgba(246,125,38,.12)}
    .chat-input-bar textarea::placeholder{color:rgba(255,255,255,.35)}
    .chat-input-bar button{background:var(--harvest-orange);color:var(--white);border:none;border-radius:12px;padding:0 22px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
    .chat-input-bar button:hover{opacity:.85}
    .chat-input-bar button:disabled{opacity:.4;cursor:not-allowed}
    /* Let chat fill the space instead of the spacer */
    .splash-container:has(.chat-wrapper) .spacer{display:none}
</style>
{% endblock %}

{% block content %}
<div class="chat-wrapper">
    <div class="chat-header">AI Chat</div>
    <div class="chat-window" id="chatWindow"></div>
    <div class="chat-input-bar">
        <textarea id="userInput" placeholder="Ask your fitness question…" rows="1"></textarea>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const chatWindow = document.getElementById('chatWindow');
    const userInput  = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const history    = [];

    function addBubble(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return div;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addBubble('user', text);
        userInput.value = '';
        userInput.style.height = 'auto';
        sendBtn.disabled = true;

        history.push({ role: 'user', content: text });

        const typing = document.createElement('div');
        typing.className = 'typing';
        typing.textContent = 'Thinking…';
        chatWindow.appendChild(typing);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: history })
            });
            const data = await res.json();
            typing.remove();

            if (data.error) {
                addBubble('error', data.error);
            } else {
                history.push({ role: 'assistant', content: data.reply });
                addBubble('assistant', data.reply);
            }
        } catch (err) {
            typing.remove();
            addBubble('error', 'Network error – could not reach server.');
        }
        sendBtn.disabled = false;
        userInput.focus();
    }

    userInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = userInput.scrollHeight + 'px';
    });
</script>
{% endblock %}
