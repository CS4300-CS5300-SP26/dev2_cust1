{% extends "core/base.html" %}

{% block title %}Forgot Password - Spotter.ai{% endblock %}

{% block content %}
<style>
    .spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top: 3px solid var(--white);
        border-right: 3px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        animation: spinSmooth 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        margin-right: 10px;
    }

    .btn.loading {
        opacity: 0.85;
        pointer-events: none;
    }

    .btn.loading .spinner {
        display: inline-block;
    }

    @keyframes spinSmooth {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .button-content {
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>

<div class="title">Forgot Password?</div>
<div class="desc">Enter your email address and we'll send you a link to reset your password.</div>
<form method="post" action="{% url 'forgot_password' %}" id="resetForm" style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:18px;margin-bottom:24px;">
    {% csrf_token %}
    <input type="email" name="email" placeholder="Email" required class="form-input">
    <button type="submit" id="resetBtn" class="btn btn-primary" style="margin-top:18px;">
        <div class="button-content">
            <span class="spinner"></span>
            <span id="resetBtnText">Send Reset Link</span>
        </div>
    </button>
</form>
<a href="{% url 'user_login' %}" style="color:var(--harvest-orange);font-size:0.95rem;text-decoration:none;">Back to Log In</a>

<script>
    document.getElementById('resetForm').addEventListener('submit', function() {
        const btn = document.getElementById('resetBtn');
        const btnText = document.getElementById('resetBtnText');
        btn.classList.add('loading');
        btn.disabled = true;
        btnText.textContent = 'Sending...';
    });
</script>
{% endblock %}
