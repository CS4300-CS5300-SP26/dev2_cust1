{% extends "core/base.html" %}

{% load static %}

{% block page_css %}
<link rel="stylesheet" href="{% static 'css/app.css' %}">
<style>
  .logo-container {
    display: none;
  }
</style>
{% endblock %}

{% block pre_content %}
<!-- Profile Bubble (top right) -->
<div class="profile-bubble">
    <button class="profile-btn" onclick="document.getElementById('profileDrop').classList.toggle('show')">
        {{ request.user.email|make_list|first|upper }}
    </button>
    <div class="profile-dropdown" id="profileDrop">
        <div class="user-info">
            <div class="user-name">{{ request.user.first_name|default:request.user.email }}</div>
            <div class="user-email">{{ request.user.email }}</div>
        </div>
        <a href="{% url 'get_started_profile' %}">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Profile
        </a>
        <a href="{% url 'user_logout' %}">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M5 5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h7v-2H5V5zm16 7l-4-4v3H9v2h8v3l4-4z"/></svg>
            Log Out
        </a>
    </div>
</div>
{% endblock %}

{% block post_container %}
<!-- Bottom Navigation -->
<div class="bottom-nav">
    <a href="{% url 'home_dash' %}" class="nav-item {% if active_tab == 'home' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Home
    </a>
    <a href="{% url 'train_page' %}" class="nav-item {% if active_tab == 'train' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
        Train
    </a>
    <a href="{% url 'nutrition_page' %}" class="nav-item {% if active_tab == 'nutrition' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-4.5-6.5-5-8.52-5C5.5 9.99 1 10.49 1 14.99V19h15.03v-4.01zM1 22.99h15.03"/></svg>
        Nutrition
    </a>
    <a href="{% url 'ai_page' %}" class="nav-item {% if active_tab == 'ai' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 10.5h-1.5V9a1.5 1.5 0 00-3 0v1.5H15a1.5 1.5 0 000 3h1.5V15a1.5 1.5 0 003 0v-1.5H21a1.5 1.5 0 000-3zM9 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        AI
    </a>
    <a href="{% url 'social_page' %}" class="nav-item {% if active_tab == 'social' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        Social
    </a>
</div>

<!-- Close dropdown when clicking outside -->
<script>
    document.addEventListener('click', function(e) {
        var dropdown = document.getElementById('profileDrop');
        var btn = document.querySelector('.profile-btn');
        if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });
</script>
{% endblock %}
