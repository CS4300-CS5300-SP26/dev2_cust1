{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email - Spotter.ai</title>
    <style>
        :root {
            --harvest-orange: #F67D26;
            --black: #000000;
            --white: #FFFFFF;
            --classic-crimson: #D42338;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .verify-container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 32px 40px;
            box-sizing: border-box;
        }
        .logo-container {
            width: 100%;
            max-width: 320px;
            border: 2px solid var(--harvest-orange);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(246, 125, 38, 0.08);
            margin-bottom: 24px;
            box-sizing: border-box;
        }
        .logo-container img {
            width: 140px;
            height: auto;
        }
        .title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .desc {
            font-size: 1rem;
            color: rgba(255,255,255,0.65);
            margin-bottom: 32px;
        }
        .form {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 24px;
        }
        .input {
            padding: 14px 18px;
            border-radius: 10px;
            border: 2px solid var(--harvest-orange);
            background: rgba(246,125,38,0.08);
            color: var(--white);
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            max-width: 320px;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: opacity 0.2s ease, transform 0.1s ease;
            box-sizing: border-box;
            background-color: var(--harvest-orange);
            color: var(--white);
            border: none;
            margin-top: 12px;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="logo-container">
            <img src="{% static 'core/images/logo.png' %}" alt="Spotter.ai Logo">
        </div>
        <div class="title">Verify Your Email</div>
        <div class="desc">Enter the 6-digit code sent to your email to activate your account.</div>
        {% if messages %}
        <div style="width:100%;max-width:320px;margin-bottom:18px;">
            {% for message in messages %}
            <div style="padding:12px 16px;border-radius:10px;margin-bottom:8px;font-size:0.95rem;
                {% if message.tags == 'error' %}background:rgba(212,35,56,0.15);border:1px solid var(--classic-crimson);color:var(--classic-crimson);
                {% else %}background:rgba(46,204,113,0.15);border:1px solid #2ecc71;color:#2ecc71;{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        <form method="post" class="form">
            {% csrf_token %}
            <input type="text" name="code" placeholder="Enter code" maxlength="6" class="input" required>
            <button type="submit" class="btn">Verify</button>
        </form>
    </div>
</body>
</html>
