# /etc/nginx/sites-available/fitness-ai-app
#
# Copy to /etc/nginx/sites-available/fitness-ai-app
# then: sudo ln -s /etc/nginx/sites-available/fitness-ai-app /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_DROPLET_IP;

    # Redirect all HTTP to HTTPS once you have a cert
    # return 301 https://$host$request_uri;

    # Static files served directly by nginx — never hits gunicorn
    location /static/ {
        alias /var/www/fitness-ai-app/fitness_ai_app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        # Proxy to the gunicorn Unix socket.
        # nginx holds this socket open across gunicorn reloads, so requests
        # queue here rather than failing while workers are being replaced.
        proxy_pass http://unix:/run/gunicorn.sock;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Give gunicorn workers time to finish long requests (match --timeout above)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
